name: Build

on:
  push:
    branches: [master]
    # tags: [v*]
  workflow_dispatch:

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev libfuse2

      - name: Install wails3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build + Package (linux)
        env:
          GOARCH: ${{ matrix.arch }}
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          wails3 task linux:package ARCH=${{ matrix.arch }}

      - name: Rename binary with version
        run: |
          APP_NAME="simple-prayertime-reminder"
          VERSION=$(awk 'BEGIN{ininfo=0} /^info:/{ininfo=1;next} /^[^[:space:]]/{if($0!~/^info:/)ininfo=0} ininfo && $1=="version:"{gsub(/"/,"",$2);print $2;exit}' build/config.yml)
          mv "bin/${APP_NAME}" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: bin/**

  windows:
    name: windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        shell: pwsh
        run: |
          "path=$(pnpm store path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          $nsis = "C:\\Program Files (x86)\\NSIS"
          if (Test-Path $nsis) {
            Add-Content $env:GITHUB_PATH $nsis
          }

      - name: Install wails3
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          Add-Content $env:GITHUB_PATH "$(go env GOPATH)\\bin"

      - name: Build + Package (windows)
        run: |
          wails3 task windows:package ARCH=${{ matrix.arch }}

      - name: Rename binary with version
        shell: pwsh
        run: |
          $app = "simple-prayertime-reminder"
          $version = $null
          $inInfo = $false
          Get-Content build/config.yml | ForEach-Object {
            $line = $_
            if ($line -match '^\s*info:\s*$') { $inInfo = $true; return }
            if ($line -match '^[^\s]' -and $line -notmatch '^\s*info:\s*$') { $inInfo = $false }
            if ($inInfo -and $line -match '^\s*version:\s*"?([^"]+)"?\s*$') {
              $version = $Matches[1].Trim()
            }
          }
          if (-not $version) { throw "Could not parse version from build/config.yml" }
          Move-Item -Force "bin\\$app.exe" "bin\\$app-v$version-windows-${{ matrix.arch }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            bin/**
            build/windows/nsis/*.exe

  macos:
    name: macos-${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install wails3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build + Package (macOS)
        run: |
          wails3 task darwin:package ARCH=${{ matrix.arch }}

      - name: Rename binary with version
        run: |
          APP_NAME="simple-prayertime-reminder"
          VERSION=$(awk 'BEGIN{ininfo=0} /^info:/{ininfo=1;next} /^[^[:space:]]/{if($0!~/^info:/)ininfo=0} ininfo && $1=="version:"{gsub(/"/,"",$2);print $2;exit}' build/config.yml)
          mv "bin/${APP_NAME}" "bin/${APP_NAME}-v${VERSION}-darwin-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            bin/**

name: Build

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[ci build]'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-22.04
            linuxdeploy_arch: x86_64
          - arch: arm64
            os: ubuntu-24.04-arm
            linuxdeploy_arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config gcc libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev libfuse2
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          fi

      - name: Install wails3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Get version
        id: version
        run: |
          VERSION=$(awk 'BEGIN{ininfo=0} /^info:/{ininfo=1;next} /^[^[:space:]]/{if($0!~/^info:/)ininfo=0} ininfo && $1=="version:"{gsub(/"/,"",$2);print $2;exit}' build/config.yml)
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build + Package (linux)
        env:
          GOARCH: ${{ matrix.arch }}
          GIT_COMMITTER_NAME: 'github-actions[bot]'
          GIT_COMMITTER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          wails3 task linux:package ARCH=${{ matrix.arch }}

      - name: Download linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{matrix.linuxdeploy_arch}}.AppImage"
          chmod +x linuxdeploy-${{matrix.linuxdeploy_arch}}.AppImage

      - name: Repackage AppImage with bundled WebKit
        run: |
          APP_NAME="simple-prayertime-reminder"

          # Find whatever AppImage wails produced and extract it
          WAILS_APPIMAGE=$(find bin/ -name "*.AppImage" | head -1)
          echo "Found AppImage: $WAILS_APPIMAGE"
          ./${WAILS_APPIMAGE} --appimage-extract

          # Re-bundle with proper GTK/WebKit libs
          ARCH="${{ matrix.linuxdeploy_arch }}" \
          DEPLOY_GTK_VERSION=4 \
          ./linuxdeploy-${{ matrix.linuxdeploy_arch }}.AppImage \
            --appdir squashfs-root \
            --plugin gtk \
            --output appimage

          # Move result to bin/ with correct arch suffix
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            SUFFIX="x86_64"
          else
            SUFFIX="aarch64"
          fi
          mv *-${SUFFIX}.AppImage "bin/${APP_NAME}-${SUFFIX}.AppImage"

      - name: Rename binary with version
        run: |
          APP_NAME="simple-prayertime-reminder"
          VERSION="${{ steps.version.outputs.app_version }}"
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            SUFFIX="x86_64"
          else
            SUFFIX="aarch64"
          fi
          mv "bin/${APP_NAME}" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}"
          # Rename packaged artifacts to include version and arch
          if [ -f "bin/${APP_NAME}-${SUFFIX}.AppImage" ]; then
            mv "bin/${APP_NAME}-${SUFFIX}.AppImage" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}.AppImage"
          fi
          if [ -f "bin/${APP_NAME}.deb" ]; then
            mv "bin/${APP_NAME}.deb" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}.deb"
          fi
          if [ -f "bin/${APP_NAME}.rpm" ]; then
            mv "bin/${APP_NAME}.rpm" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}.rpm"
          fi
          if [ -f "bin/${APP_NAME}.pkg.tar.zst" ]; then
            mv "bin/${APP_NAME}.pkg.tar.zst" "bin/${APP_NAME}-v${VERSION}-linux-${{ matrix.arch }}.pkg.tar.zst"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-v${{ steps.version.outputs.app_version }}
          path: bin/**

  windows:
    name: windows-${{ matrix.arch }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[ci build]'))
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        shell: pwsh
        run: |
          "path=$(pnpm store path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          $nsis = "C:\\Program Files (x86)\\NSIS"
          if (Test-Path $nsis) {
            Add-Content $env:GITHUB_PATH $nsis
          }

      - name: Install wails3
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          Add-Content $env:GITHUB_PATH "$(go env GOPATH)\\bin"

      - name: Build + Package (windows)
        run: |
          wails3 task windows:package ARCH=${{ matrix.arch }}

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content build/config.yml -Raw
          if ($content -match '(?ms)^info:.*?version:\s*"([0-9]+\.[0-9]+\.[0-9][^"]*)"') {
            $version = $Matches[1]
          } else {
            throw "Could not parse version from build/config.yml"
          }
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Rename binary with version
        shell: pwsh
        run: |
          $app = "simple-prayertime-reminder"
          $version = "${{ steps.version.outputs.app_version }}"
          Write-Host "Version: $version"
          Move-Item -Force "bin\\$app.exe" "bin\\$app-v$version-windows-${{ matrix.arch }}.exe"
          Move-Item -Force "bin\\$app-amd64-installer.exe" "bin\\$app-v$version-windows-${{ matrix.arch }}-installer.exe"
          # the packaged version become amd64 somehow?? so we use that name instead

      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}-v${{ steps.version.outputs.app_version }}
          path: |
            bin/**
            build/windows/nsis/*.exe

  macos:
    name: macos-${{ matrix.arch }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[ci build]'))
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Cache pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install wails3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build + Package (macOS)
        run: |
          wails3 task darwin:package ARCH=${{ matrix.arch }}

      - name: Get version
        id: version
        run: |
          VERSION=$(awk 'BEGIN{ininfo=0} /^info:/{ininfo=1;next} /^[^[:space:]]/{if($0!~/^info:/)ininfo=0} ininfo && $1=="version:"{gsub(/"/,"",$2);print $2;exit}' build/config.yml)
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename binary with version
        run: |
          APP_NAME="simple-prayertime-reminder"
          VERSION="${{ steps.version.outputs.app_version }}"
          mv "bin/${APP_NAME}" "bin/${APP_NAME}-v${VERSION}-darwin-${{ matrix.arch }}"
          if [ -d "bin/${APP_NAME}.app" ]; then
            mv "bin/${APP_NAME}.app" "bin/${APP_NAME}-v${VERSION}-darwin-${{ matrix.arch }}.app"
          fi

      - name: Zip app bundle (macOS)
        run: |
          APP_NAME="simple-prayertime-reminder"
          VERSION=$(awk 'BEGIN{ininfo=0} /^info:/{ininfo=1;next} /^[^[:space:]]/{if($0!~/^info:/)ininfo=0} ininfo && $1=="version:"{gsub(/"/,"",$2);print $2;exit}' build/config.yml)
          APP_DIR="bin/${APP_NAME}-v${VERSION}-darwin-${{ matrix.arch }}.app"
          if [ -d "$APP_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "bin/${APP_NAME}-v${VERSION}-darwin-${{ matrix.arch }}.app.zip"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-v${{ steps.version.outputs.app_version }}
          path: |
            bin/**

  release:
    name: draft-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/**/*
